<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta 廣告成效總覽</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 text-slate-800">

    <header class="bg-white border-b border-slate-200 px-6 py-4">
        <h1 class="text-xl font-bold">成效總覽</h1>
    </header>

    <main class="p-6 space-y-6">

        <!-- 控制列：時間區間 + 指標勾選 -->
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center gap-4">
            <div class="flex items-center gap-2">
                <label for="rangeSelect" class="text-sm font-medium text-slate-600">時間區間：</label>
                <select id="rangeSelect" class="border border-slate-300 rounded-lg text-sm px-3 py-1.5">
                    <option value="1d">過去1天</option>
                    <option value="7d">過去7天</option>
                    <option value="30d" selected>過去30天</option>
                    <option value="month">當月</option>
                </select>
            </div>

            <div id="kpi-checkboxes" class="flex flex-wrap items-center gap-4">
                <!-- 指標勾選框由 app.js 動態產生 -->
            </div>
        </div>

        <!-- KPI 卡片 -->
        <div id="kpi-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- KPI 卡片會由 app.js 動態產生在這裡 -->
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
